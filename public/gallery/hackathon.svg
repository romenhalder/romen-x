<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020B18"/>
      <stop offset="100%" stop-color="#041E3A"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <!-- Decorative circles -->
  <circle cx="400" cy="250" r="120" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <circle cx="400" cy="250" r="80" fill="none" stroke="rgba(0,144,255,0.2)" stroke-width="1"/>
  <circle cx="400" cy="250" r="40" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <!-- Trophy icon -->
  <text x="400" y="265" text-anchor="middle" font-size="36" fill="#FFD700">🏆</text>
  <!-- Text -->
  <text x="400" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#00D4FF">Smart India Hackathon 2025</text>
  <text x="400" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#8ECAE6">Team Leader · Government of India</text>
  <text x="400" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="rgba(142,202,230,0.6)">Replace with your actual photo</text>
  <!-- Corner badges -->
  <rect x="20" y="20" width="120" height="28" rx="14" fill="rgba(255,215,0,0.15)" stroke="rgba(255,215,0,0.4)" stroke-width="1"/>
  <text x="80" y="39" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FFD700">Hackathon</text>
  <text x="780" y="590" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="rgba(142,202,230,0.4)">Romen Halder Portfolio</text>
</svg>
